# Cloudflare Pages / Workers Deployment Configuration
# Build for the globe with edge functions
name = "forgexy"
pages_build_output_dir = "./dist"
compatibility_date = "2026-06-20"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[vars]
# Ensure you attach these secrets in your Cloudflare dashboard under pages configuration:
# GEMINI_API_KEY = "your-api-key"
# GROQ_API_KEY = "your-api-key"

[[d1_databases]]
binding = "FORGE"
database_name = "forge"
# Replace with your actual database_id from your Cloudflare Dashboard (e.g. "xxxx-xxxx-xxxx-xxxx")
database_id = "" 
